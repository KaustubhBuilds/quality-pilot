name: QualityPilot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start Odoo with Docker Compose
        run: docker compose up -d

      - name: Initialize Odoo database
        run: |
          sleep 30
          docker compose run --rm odoo odoo -i base,sale_management,crm,stock,contacts \
            --db_host db \
            --db_user odoo \
            --db_password odoo \
            --database quality_pilot_db \
            --stop-after-init

      - name: Wait for Odoo to be ready
        run: |
          echo "Waiting for Odoo..."
          for i in {1..30}; do
            if curl -s http://localhost:8069/web/login > /dev/null; then
              echo "Odoo is ready"
              break
            fi
            echo "Attempt $i - waiting 10 seconds..."
            sleep 10
          done

      - name: Restart Odoo after init
        run: docker compose restart odoo

      - name: Wait for Odoo restart
        run: sleep 30

      - name: Run smoke tests
        run: pytest -m smoke --alluredir=allure-results
        env:
          BASE_URL: http://localhost:8069
          ODOO_DB: quality_pilot_db
          ODOO_USER: admin
          ODOO_PASSWORD: admin
          HEADLESS: "true"

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
