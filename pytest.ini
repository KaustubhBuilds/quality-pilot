[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --alluredir=allure-results
    --tb=short
    -v
markers =
    smoke: smoke tests — run these first, they are fast and critical
    ui: UI tests using Playwright browser automation
    api: API tests using requests library — no browser
    combined: API setup followed by UI verification
    regression: full regression suite
